<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Gallery</title>

  <!-- Swiper CSS -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />

  <style>
    /* ── Reset & Base ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: transparent;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Helvetica Neue', sans-serif;
      overflow: hidden;
    }

    /* ── Wrapper ── */
    .carousel-wrapper {
      width: 100%;
      max-width: 860px;
      padding: 0 48px;        /* 留空間給左右箭頭 */
      position: relative;
    }

    /* ── Swiper Container ── */
    .swiper {
      width: 100%;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 8px 40px rgba(0,0,0,0.18);
    }

    /* ── Slides ── */
    .swiper-slide {
      position: relative;
      aspect-ratio: 16 / 9;   /* 維持比例，可改成 4/3 等 */
      overflow: hidden;
      cursor: pointer;
      display: block;
    }

    .swiper-slide img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.5s ease;
      pointer-events: none;   /* 讓點擊穿透到 <a> */
    }

    .swiper-slide:hover img {
      transform: scale(1.04);
    }

    /* 讓整個 slide 可點擊 */
    .swiper-slide a {
      position: absolute;
      inset: 0;
      display: block;
      z-index: 2;
    }

    /* ── 箭頭 ── */
    .swiper-button-prev,
    .swiper-button-next {
      width: 40px;
      height: 40px;
      background: rgba(255,255,255,0.92);
      border-radius: 50%;
      box-shadow: 0 2px 12px rgba(0,0,0,0.15);
      color: #333;
      transition: background 0.2s, transform 0.2s;
    }

    .swiper-button-prev:hover,
    .swiper-button-next:hover {
      background: #fff;
      transform: scale(1.08);
    }

    .swiper-button-prev::after,
    .swiper-button-next::after {
      font-size: 14px;
      font-weight: 700;
    }

    /* ── 底部小圓點 ── */
    .swiper-pagination {
      bottom: 10px !important;
    }

    .swiper-pagination-bullet {
      width: 8px;
      height: 8px;
      background: rgba(255,255,255,0.6);
      opacity: 1;
      transition: background 0.3s, transform 0.3s;
    }

    .swiper-pagination-bullet-active {
      background: #fff;
      transform: scale(1.3);
    }
  </style>
</head>

<body>
  <div class="carousel-wrapper">
    <div class="swiper mySwiper">
      <div class="swiper-wrapper">

        <!-- ✏️ 第 1 張：換成你的圖片網址 & 目標連結 -->
        <div class="swiper-slide">
          <img src="YOUR_IMAGE_URL_1" alt="Slide 1" />
          <a href="YOUR_LINK_URL_1" target="_blank" rel="noopener"></a>
        </div>

        <!-- ✏️ 第 2 張 -->
        <div class="swiper-slide">
          <img src="YOUR_IMAGE_URL_2" alt="Slide 2" />
          <a href="YOUR_LINK_URL_2" target="_blank" rel="noopener"></a>
        </div>

        <!-- ✏️ 第 3 張 -->
        <div class="swiper-slide">
          <img src="YOUR_IMAGE_URL_3" alt="Slide 3" />
          <a href="YOUR_LINK_URL_3" target="_blank" rel="noopener"></a>
        </div>

        <!-- ✏️ 第 4 張 -->
        <div class="swiper-slide">
          <img src="YOUR_IMAGE_URL_4" alt="Slide 4" />
          <a href="YOUR_LINK_URL_4" target="_blank" rel="noopener"></a>
        </div>

        <!-- ✏️ 第 5 張 -->
        <div class="swiper-slide">
          <img src="YOUR_IMAGE_URL_5" alt="Slide 5" />
          <a href="YOUR_LINK_URL_5" target="_blank" rel="noopener"></a>
        </div>

      </div><!-- /.swiper-wrapper -->

      <!-- 箭頭 & 圓點 -->
      <div class="swiper-button-prev"></div>
      <div class="swiper-button-next"></div>
      <div class="swiper-pagination"></div>
    </div><!-- /.swiper -->
  </div><!-- /.carousel-wrapper -->

  <!-- Swiper JS -->
  <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
  <script>
    const swiper = new Swiper('.mySwiper', {
      // ── 自動播放：5 秒切換，滑鼠移入暫停 ──
      autoplay: {
        delay: 5000,
        disableOnInteraction: false,
        pauseOnMouseEnter: true,
      },

      // ── 無限循環 ──
      loop: true,

      // ── 切換動畫速度（ms）──
      speed: 700,

      // ── 箭頭 ──
      navigation: {
        nextEl: '.swiper-button-next',
        prevEl: '.swiper-button-prev',
      },

      // ── 底部圓點 ──
      pagination: {
        el: '.swiper-pagination',
        clickable: true,
      },
    });
  </script>
</body>
</html>
